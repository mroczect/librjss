name: Deploy Manpage to GitHub Pages

on:
  push:
    branches: [ master ]
    paths:
      - 'docs/librjss.3'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mandoc
        run: sudo apt-get update && sudo apt-get install -y mandoc

      - name: Buat direktori output
        run: mkdir -p _site

      - name: Generate HTML dari manpage
        run: mandoc -Thtml docs/librjss.3 > _site/index.html

      - name: Tambahkan CSS biar tampilan lebih rapi (opsional)
        run: |
          cat >> _site/index.html << 'EOF'
          <style>
            body { font-family: monospace; max-width: 80ch; margin: 2em auto; padding: 0 1em; line-height: 1.5; }
          </style>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'          # hanya folder _site yang diunggah

      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
