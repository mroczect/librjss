name: Deploy man page to GitHub Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install groff
        run: |
          sudo apt-get update
          sudo apt-get install -y groff

      - name: Find man page file
        id: manpage
        run: |
          MANFILE=$(ls docs/librjss.3 | head -1)
          if [ -z "$MANFILE" ]; then
            echo "Error: No man page found in manual/"
            exit 1
          fi
          echo "path=$MANFILE" >> $GITHUB_OUTPUT
          echo "file=$(basename $MANFILE)" >> $GITHUB_OUTPUT

      - name: Convert man page to HTML
        run: |
          mkdir -p public
          groff -mandoc -Thtml ${{ steps.manpage.outputs.path }} > public/index.html
          echo '<style>body{font-family:monospace; max-width:80ch; margin:2em auto; padding:0 1em;}</style>' >> public/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
