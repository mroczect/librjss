name: Deploy Manpage to GitHub Pages

on:
  push:
    branches: [ master ]
    paths:
      - 'docs/librjss.3'
  workflow_dispatch:

# Beri izin yang dibutuhkan
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mandoc
        run: sudo apt-get update && sudo apt-get install -y mandoc

      - name: Generate HTML from manpage
        run: mandoc -Thtml docs/librjss.3 > librjss.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'              # upload semua file, librjss.html akan di-root
          # Jika hanya ingin file tertentu:
          # path: 'librjss.html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4