name: Library Release (librjss)

on:
  push:
    tags:
      - "lib-v*"

jobs:
  build-lib:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: librjss-x86_64-linux
            ext: so
          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: librjss-x86_64-macos
            ext: dylib
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: librjss-aarch64-macos
            ext: dylib
          # Windows MSVC
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: librjss-x86_64-windows
            ext: dll

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain and target
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build library (release)
        working-directory: librjss
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare release artifacts
        shell: bash
        run: |
          mkdir -p upload
          TARGET_DIR="target/${{ matrix.target }}/release"

          # Copy library files
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "$TARGET_DIR/librjss.dll" upload/ 2>/dev/null || true
            cp "$TARGET_DIR/librjss.dll.lib" upload/ 2>/dev/null || true
            cp "$TARGET_DIR/librjss.lib" upload/ 2>/dev/null || true
          else
            cp "$TARGET_DIR/liblibrjss.${{ matrix.ext }}" upload/ 2>/dev/null || true
            cp "$TARGET_DIR/liblibrjss.a" upload/ 2>/dev/null || true
          fi

          # Copy header if present (user must generate manually or add cbindgen step)
          if [ -f "librjss.h" ]; then
            cp librjss.h upload/
          fi

          # Create archive
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "${{ matrix.artifact }}.zip" ./upload/*
          else
            tar -czf "${{ matrix.artifact }}.tar.gz" -C upload .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.* # tar.gz or zip

  release:
    needs: build-lib
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/lib-v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p dist
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} dist/ \;
          ls -lh dist/

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum * > ../SHA256SUMS
          cat ../SHA256SUMS

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: "dist/*,SHA256SUMS"
          body: |
            ## librjss ${{ github.ref_name }}

            Pre-built shared and static libraries for:
            - Linux (x86_64)
            - macOS (Intel x86_64, Apple Silicon)
            - Windows (x86_64 MSVC)

            ### SHA256 Checksums

            ${{ steps.checksum.outputs.checksums }}

          token: ${{ secrets.GITHUB_TOKEN }}
